name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install .NET 10 x86 runtimes for test host
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile dotnet-install.ps1 -UseBasicParsing
          & ./dotnet-install.ps1 -Channel 10.0 -Architecture x86 -InstallDir 'C:\Program Files (x86)\dotnet' -Runtime dotnet
          & ./dotnet-install.ps1 -Channel 10.0 -Architecture x86 -InstallDir 'C:\Program Files (x86)\dotnet' -Runtime windowsdesktop
          Remove-Item dotnet-install.ps1

      - name: Set DOTNET_ROOT(x86) for x86 test host
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value 'DOTNET_ROOT(x86)=C:\Program Files (x86)\dotnet'

      - name: Restore
        run: dotnet restore NextGenerationPhotobooth.sln --runtime win-x86

      - name: Build
        run: dotnet build NextGenerationPhotobooth.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test Photobooth.Tests/Photobooth.Tests.csproj -c Release --no-build --no-restore --verbosity normal

      - name: Publish (self-contained win-x86)
        run: >-
          dotnet publish Photobooth/Photobooth.csproj
          -c Release
          -r win-x86
          --self-contained true
          --no-restore
          -o ./publish

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: >-
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          installer\Photobooth.iss
          "/DMyAppVersion=${{ github.sha }}"
          "/DPublishDir=./publish"
          "/O."

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoboothSetup-${{ github.sha }}
          path: PhotoboothSetup-${{ github.sha }}.exe
          retention-days: 30
